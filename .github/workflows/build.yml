name: Сборка Android приложения

# Запускать сборку, когда мы отправляем (push) код в репозиторий
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Скачиваем код из репозитория
    - uses: actions/checkout@v4

    # 2. Устанавливаем Java (нужна для сборки Android)
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 3. Даем разрешение на запуск сборщика
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 4. Собираем проект и создаем APK файл
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # 5. Сохраняем готовый APK файл, чтобы его можно было скачать
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-pass-app
        path: app/build/outputs/apk/debug/app-debug.apk
